<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Run JavaScript</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #172033;
      }

      main {
        width: min(92vw, 640px);
        padding: 24px;
        border: 1px solid #d8deea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 42px rgba(31, 45, 70, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }

      button {
        min-width: 96px;
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        background: #1769e0;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #1258bf;
      }

      pre {
        min-height: 120px;
        margin: 18px 0 0;
        padding: 14px;
        overflow: auto;
        border-radius: 6px;
        background: #101827;
        color: #d8f7df;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JavaScript Runner</h1>
      <button id="runButton" type="button">Run</button>
      <pre id="output">Click Run to execute first.js</pre>
    </main>

    <script>
      const runButton = document.querySelector("#runButton");
      const output = document.querySelector("#output");

      runButton.addEventListener("click", async () => {
        output.textContent = "";

        const originalLog = console.log;
        console.log = (...messages) => {
          output.textContent += `${messages.join(" ")}\n`;
          originalLog(...messages);
        };

        try {
          const response = await fetch(`first.js?t=${Date.now()}`);
          const code = await response.text();
          new Function(code)();
        } catch (error) {
          output.textContent += `Error: ${error.message}`;
        } finally {
          console.log = originalLog;
        }

        if (!output.textContent.trim()) {
          output.textContent = "Code ran with no console output.";
        }
      });
    </script>
  </body>
</html>
